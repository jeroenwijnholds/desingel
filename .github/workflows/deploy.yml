name: Deploy naar GitHub Pages

on:
  push:
    branches: [master]
  repository_dispatch:
    types: [sanity-publish]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Bij snel opeenvolgende Sanity-publishes wordt een lopende build
# geannuleerd en vervangen door de nieuwste — scheelt Actions-minuten.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build static site
        # npm run build = nuxt generate + sitemap.xml/robots.txt-generatie
        run: npm run build
        env:
          SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID }}
          SANITY_DATASET: ${{ vars.SANITY_DATASET }}
          NUXT_APP_BASE_URL: ${{ steps.pages.outputs.base_path }}/
          NUXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.base_url }}
          NUXT_PUBLIC_WEB3FORMS_KEY: ${{ vars.WEB3FORMS_ACCESS_KEY }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
